syntax = "proto3";

package location;

service LocationService {
  rpc GetLocations (LocationRequest) returns (LocationResponse);
}

message LocationRequest {
  int32 person_id = 1;
  string start_date = 2;
  string end_date = 3;
}

message Location {
  int32 person_id = 1;
  double latitude = 2;
  double longitude = 3;
  string creation_time = 4;
}

message LocationResponse {
  repeated Location locations = 1;
}